<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VKT Market Data</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:Arial,sans-serif; background:#f7f6f3; color:#1a1a1a; }

nav {
  background:#fff;
  border-bottom:1px solid #e4e2dc;
  padding:0 2rem;
  height:56px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.logo {
  font-size:12px;
  font-weight:700;
  letter-spacing:4px;
  text-transform:uppercase;
}
.logo span { color:#d4a843; }

.header {
  padding:1.5rem 2rem;
  background:#fff;
  border-bottom:1px solid #e4e2dc;
}

h1 { font-size:22px; font-weight:300; }
h1 strong { color:#d4a843; }

.toolbar {
  padding:1rem 2rem;
  background:#fff;
  border-bottom:1px solid #e4e2dc;
  display:grid;
  grid-template-columns:2fr 1fr 1fr 1fr;
  gap:12px;
}

.toolbar input, .toolbar select {
  padding:10px;
  border:1px solid #ccc;
}

.summary {
  padding:10px 2rem;
  font-size:12px;
  background:#faf9f6;
}

.table-wrap {
  padding:1.5rem 2rem;
}

table {
  width:100%;
  border-collapse:collapse;
  background:#fff;
}

th, td {
  padding:10px;
  border-bottom:1px solid #eee;
}

th {
  background:#f3f1ec;
  cursor:pointer;
}

tr:hover { background:#faf7f0; }

.gold { color:#d4a843; font-weight:bold; }
.mono { font-family:monospace; }
.msg { padding:40px; text-align:center; }

</style>
</head>

<body>

<nav>
  <div class="logo">Victory Kay <span>Tickets</span></div>
</nav>

<div class="header">
  <h1><strong>VKT</strong> Market Data</h1>
</div>

<div class="toolbar">
  <input id="search" placeholder="Search event...">

  <select id="sortField">
    <option value="date">Date</option>
    <option value="floor">Floor</option>
    <option value="atp">ATP</option>
    <option value="listings">Listings</option>
  </select>

  <select id="sortDir">
    <option value="asc">Asc</option>
    <option value="desc">Desc</option>
  </select>

  <button onclick="load()">Refresh</button>
</div>

<div id="summary" class="summary">Loading...</div>

<div class="table-wrap">
  <div id="table">Loading...</div>
</div>

<script>

/* ✅ YOUR ORIGINAL WORKING CONFIG */
var SB  = 'https://unypasitbzulafehbqtj.supabase.co';
var KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVueXBhc2l0Ynp1bGFmZWhicXRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwMTE2MjAsImV4cCI6MjA5MDU4NzYyMH0.ywGB7ZccbVxcgZDXMOQB9Ui8R-SF4xF0SKkWavDbRGI';
var H   = { apikey: KEY, Authorization: 'Bearer ' + KEY };

var allRows = [];

function get(url) {
  return fetch(SB + url, { headers: H })
    .then(r => {
      if (!r.ok) throw new Error("HTTP " + r.status);
      return r.json();
    });
}

function load() {
  document.getElementById('table').innerHTML = "Loading...";

  get('/rest/v1/volume_snapshots?order=scraped_at.desc&limit=200&select=event_id')
  .then(snaps => {

    let ids = [];
    let seen = {};

    snaps.forEach(s => {
      if (!seen[s.event_id]) {
        seen[s.event_id] = true;
        ids.push(s.event_id);
      }
    });

    ids = ids.slice(0, 50);

    if (!ids.length) {
      throw new Error("No event IDs found");
    }

    let idList = ids.map(i => `"${i}"`).join(',');

    return Promise.all([
      get('/rest/v1/events?id=in.(' + idList + ')&select=id,name,date,venue'),
      get('/rest/v1/volume_snapshots?event_id=in.(' + idList + ')&select=*')
    ]);

  }).then(([events, snaps]) => {

    allRows = events.map(ev => {

      let evSnaps = snaps.filter(s => s.event_id === ev.id);

      let floors = evSnaps.filter(x => x.event_floor > 0);
      let lists  = evSnaps.filter(x => x.total_listings > 0);
      let atps   = evSnaps.filter(x => x.section_avg > 0);

      let floor = floors[0]?.event_floor || 0;
      let listings = lists[0]?.total_listings || 0;
      let atp = atps.length
        ? atps.reduce((a,x)=>a+x.section_avg,0)/atps.length
        : 0;

      return {
        name: ev.name,
        date: ev.date,
        venue: ev.venue,
        floor,
        atp,
        listings
      };
    });

    render();

  }).catch(err => {
    console.error(err);
    document.getElementById('table').innerHTML =
      '<div class="msg">Error: ' + err.message + '</div>';
  });
}

function render() {

  let search = document.getElementById('search').value.toLowerCase();

  let rows = allRows.filter(r =>
    r.name.toLowerCase().includes(search)
  );

  let field = document.getElementById('sortField').value;
  let dir = document.getElementById('sortDir').value === 'desc' ? -1 : 1;

  rows.sort((a,b)=> (a[field] - b[field]) * dir);

  let html = '<table>';
  html += '<tr><th>Event</th><th>Date</th><th>Floor</th><th>ATP</th><th>Listings</th></tr>';

  rows.forEach(r=>{
    html += `
      <tr>
        <td>${r.name}</td>
        <td>${r.date || ''}</td>
        <td class="gold">$${Math.round(r.floor)}</td>
        <td>$${Math.round(r.atp)}</td>
        <td>${r.listings}</td>
      </tr>`;
  });

  html += '</table>';

  document.getElementById('table').innerHTML = html;

  document.getElementById('summary').innerHTML =
    rows.length + " events";
}

/* filters */
document.getElementById('search').addEventListener('input', render);
document.getElementById('sortField').addEventListener('change', render);
document.getElementById('sortDir').addEventListener('change', render);

load();

</script>

</body>
</html>
