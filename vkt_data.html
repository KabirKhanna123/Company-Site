<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VKT Market Data</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: Arial, sans-serif; background:#0c0c0c; color:#fff; }
    nav { background:#0c0c0c; border-bottom:1px solid #222; padding:0 2rem; height:56px; display:flex; align-items:center; justify-content:space-between; }
    .logo { font-size:12px; font-weight:700; letter-spacing:4px; text-transform:uppercase; color:#fff; }
    .logo span { color:#d4a843; }
    .header { padding:2rem; border-bottom:1px solid #1e1e1e; }
    .title { font-size:24px; font-weight:300; color:#fff; margin-bottom:4px; }
    .title strong { color:#d4a843; }
    .subtitle { font-size:12px; color:#555; }
    .toolbar { padding:1rem 2rem; border-bottom:1px solid #1e1e1e; display:flex; gap:1rem; align-items:center; flex-wrap:wrap; }
    .toggle { display:flex; gap:1px; }
    .toggle button { padding:7px 16px; font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase; cursor:pointer; border:none; font-family:Arial; background:#1e1e1e; color:#555; }
    .toggle button.active { background:#d4a843; color:#0c0c0c; }
    input[type=text] { padding:7px 12px; background:#1e1e1e; border:1px solid #333; color:#fff; font-size:12px; width:200px; outline:none; }
    input[type=text]:focus { border-color:#d4a843; }
    select { padding:7px 10px; background:#1e1e1e; border:1px solid #333; color:#fff; font-size:11px; outline:none; cursor:pointer; }
    .main { padding:1.5rem 2rem; }
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:1px; background:#1e1e1e; }
    .card { background:#111; padding:1.25rem; cursor:pointer; transition:background 0.15s; border-left:3px solid #1e1e1e; }
    .card:hover { background:#161616; border-left-color:#d4a843; }
    .card-name { font-size:13px; font-weight:600; color:#fff; margin-bottom:4px; line-height:1.3; }
    .card-meta { font-size:10px; color:#555; margin-bottom:12px; }
    .card-stats { display:grid; grid-template-columns:1fr 1fr 1fr; gap:1px; background:#1e1e1e; }
    .card-stat { background:#0c0c0c; padding:8px; text-align:center; }
    .card-stat-label { font-size:8px; letter-spacing:1px; text-transform:uppercase; color:#444; margin-bottom:3px; }
    .card-stat-val { font-size:15px; font-weight:700; color:#fff; font-family:monospace; }
    .card-stat-val.gold { color:#d4a843; }
    .badge { display:inline-block; font-size:8px; font-weight:700; letter-spacing:1px; text-transform:uppercase; padding:2px 6px; margin-right:4px; }
    .badge.primary { background:rgba(26,74,138,0.3); color:#6a9fd8; }
    .badge.secondary { background:rgba(160,120,32,0.3); color:#d4a843; }
    .empty { padding:4rem; text-align:center; color:#333; font-size:14px; }
    .loading-msg { padding:4rem; text-align:center; color:#444; font-size:11px; letter-spacing:3px; }
    #detail { display:none; padding:1.5rem 2rem; }
    .back-btn { background:none; border:1px solid #333; color:#888; padding:6px 14px; font-size:11px; cursor:pointer; margin-bottom:1.5rem; font-family:Arial; }
    .back-btn:hover { border-color:#d4a843; color:#d4a843; }
    .detail-name { font-size:20px; font-weight:700; color:#fff; margin-bottom:6px; }
    .detail-meta { font-size:12px; color:#555; margin-bottom:1.5rem; }
    .panels { display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-bottom:1.5rem; }
    .panel { background:#111; border:1px solid #1e1e1e; padding:1.25rem; }
    .panel-title { font-size:10px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:#d4a843; margin-bottom:1rem; padding-bottom:8px; border-bottom:1px solid #1e1e1e; }
    .panel-row { display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid #161616; font-size:12px; }
    .panel-row:last-child { border:none; }
    .panel-label { color:#555; }
    .panel-val { color:#fff; font-family:monospace; font-weight:600; }
    .panel-val.gold { color:#d4a843; }
    .panel-empty { color:#333; font-size:11px; font-style:italic; text-align:center; padding:1rem 0; }
    table { width:100%; border-collapse:collapse; background:#111; }
    th { padding:8px 12px; text-align:left; font-size:9px; letter-spacing:2px; text-transform:uppercase; color:#444; background:#0c0c0c; }
    td { padding:9px 12px; font-size:12px; color:#888; border-bottom:1px solid #1a1a1a; font-family:monospace; }
    td:first-child { color:#fff; font-family:Arial; }
    td.gold { color:#d4a843; font-weight:700; }
    tbody tr:hover td { background:#161616; }
    @media(max-width:600px) { .panels { grid-template-columns:1fr; } }
  </style>
</head>
<body>
<nav>
  <div class="logo">Victory Kay <span>Tickets</span></div>
  <a href="/" style="color:#555;font-size:11px;text-decoration:none;">← Back</a>
</nav>
<div class="header">
  <div class="title"><strong>VKT</strong> Market Data</div>
  <div class="subtitle">Primary = Ticketmaster face value · Secondary = StubHub resale</div>
</div>
<div class="toolbar">
  <div class="toggle">
    <button id="btn-primary" class="active" onclick="setFilter('primary')">Primary</button>
    <button id="btn-secondary" onclick="setFilter('secondary')">Secondary</button>
  </div>
  <input type="text" id="search" placeholder="Search events..." oninput="render()">
  <select id="sort" onchange="render()">
    <option value="date">Sort: Date</option>
    <option value="name">Sort: Name</option>
    <option value="floor">Sort: Floor Price</option>
  </select>
</div>
<div class="main" id="main-view">
  <div class="loading-msg" id="loading-msg">LOADING...</div>
  <div class="grid" id="grid"></div>
</div>
<div id="detail">
  <button class="back-btn" onclick="showList()">← All Events</button>
  <div class="detail-name" id="d-name"></div>
  <div class="detail-meta" id="d-meta"></div>
  <div class="panels" id="d-panels"></div>
  <div id="d-table"></div>
</div>
<script>
const SB = 'https://unypasitbzulafehbqtj.supabase.co';
const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVueXBhc2l0Ynp1bGFmZWhicXRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwMTE2MjAsImV4cCI6MjA5MDU4NzYyMH0.ywGB7ZccbVxcgZDXMOQB9Ui8R-SF4xF0SKkWavDbRGI';
let events=[], snaps=[], mode='primary';

async function q(table, params) {
  const r = await fetch(`${SB}/rest/v1/${table}?${params}`, { headers:{ apikey:KEY, Authorization:`Bearer ${KEY}` } });
  return r.json();
}

async function load() {
  document.getElementById('loading-msg').textContent = 'LOADING...';
  document.getElementById('loading-msg').style.display = 'block';
  document.getElementById('grid').innerHTML = '';
  const plat = mode==='primary' ? 'Ticketmaster' : 'StubHub';
  events = await q('events', `platform=eq.${plat}&order=date.asc&limit=100&select=id,name,date,venue,platform`);
  if (events.length) {
    const ids = events.map(e=>e.id).join(',');
    snaps = await q('volume_snapshots', `event_id=in.(${ids})&order=scraped_at.desc&limit=500&select=id,event_id,total_listings,event_floor,section_floor,section_avg,section_ceiling,section,section_listings,scraped_at`);
  } else snaps = [];
  document.getElementById('loading-msg').style.display = 'none';
  render();
}

function gs(id) { return snaps.filter(s=>s.event_id===id); }
function sum(id) {
  const s=gs(id);
  const fl=s.filter(x=>x.event_floor>0).sort((a,b)=>new Date(b.scraped_at)-new Date(a.scraped_at));
  const li=s.filter(x=>x.total_listings>0).sort((a,b)=>new Date(b.scraped_at)-new Date(a.scraped_at));
  const at=s.filter(x=>x.section_avg>0);
  return { floor:fl[0]?.event_floor||null, listings:li[0]?.total_listings||null, atp:at.length?Math.round(at.reduce((a,x)=>a+x.section_avg,0)/at.length):null, sections:new Set(s.filter(x=>x.section).map(x=>x.section)).size };
}

function render() {
  const q2=document.getElementById('search').value.toLowerCase();
  const sort=document.getElementById('sort').value;
  let list=events.filter(e=>!q2||(e.name||'').toLowerCase().includes(q2));
  list.sort((a,b)=>{
    if(sort==='date') return (a.date||'').localeCompare(b.date||'');
    if(sort==='name') return (a.name||'').localeCompare(b.name||'');
    if(sort==='floor') return (sum(b.id).floor||0)-(sum(a.id).floor||0);
    return 0;
  });
  if(!list.length){document.getElementById('grid').innerHTML='<div class="empty">No events found.</div>';return;}
  document.getElementById('grid').innerHTML=list.map(ev=>{
    const s=sum(ev.id), isPri=ev.platform==='Ticketmaster';
    const date=ev.date?new Date(ev.date+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}):'—';
    return `<div class="card" onclick="showDetail('${ev.id}')">
      <div class="card-name">${ev.name||'—'}</div>
      <div class="card-meta"><span class="badge ${isPri?'primary':'secondary'}">${isPri?'Primary':'Secondary'}</span>${date}${ev.venue?' · '+ev.venue.split(',')[0]:''}</div>
      <div class="card-stats">
        <div class="card-stat"><div class="card-stat-label">Floor</div><div class="card-stat-val gold">${s.floor?'$'+s.floor:'—'}</div></div>
        <div class="card-stat"><div class="card-stat-label">ATP</div><div class="card-stat-val">${s.atp?'$'+s.atp:'—'}</div></div>
        <div class="card-stat"><div class="card-stat-label">${isPri?'Sections':'Listings'}</div><div class="card-stat-val">${isPri?(s.sections||'—'):(s.listings?s.listings.toLocaleString():'—')}</div></div>
      </div>
    </div>`;
  }).join('');
}

function setFilter(f){
  mode=f;
  document.getElementById('btn-primary').className=f==='primary'?'active':'';
  document.getElementById('btn-secondary').className=f==='secondary'?'active':'';
  load();
}

function showDetail(id){
  const ev=events.find(e=>e.id===id); if(!ev) return;
  document.getElementById('main-view').style.display='none';
  document.getElementById('detail').style.display='block';
  const s=gs(id), isPri=ev.platform==='Ticketmaster';
  const date=ev.date?new Date(ev.date+'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'}):'—';
  document.getElementById('d-name').textContent=ev.name||'—';
  document.getElementById('d-meta').textContent=date+(ev.venue?' · '+ev.venue:'');
  const fl=s.filter(x=>x.event_floor>0).sort((a,b)=>new Date(b.scraped_at)-new Date(a.scraped_at));
  const at=s.filter(x=>x.section_avg>0);
  const li=s.filter(x=>x.total_listings>0).sort((a,b)=>new Date(b.scraped_at)-new Date(a.scraped_at));
  const ceil=s.filter(x=>x.section_ceiling>0).sort((a,b)=>new Date(b.scraped_at)-new Date(a.scraped_at));
  document.getElementById('d-panels').innerHTML=`
    <div class="panel"><div class="panel-title">${isPri?'Primary — Ticketmaster':'Secondary — StubHub'}</div>
      ${fl[0]?`<div class="panel-row"><span class="panel-label">Floor</span><span class="panel-val gold">$${fl[0].event_floor}</span></div>`:''}
      ${ceil[0]?`<div class="panel-row"><span class="panel-label">Ceiling</span><span class="panel-val">$${ceil[0].section_ceiling}</span></div>`:''}
      ${at.length?`<div class="panel-row"><span class="panel-label">Avg ATP</span><span class="panel-val">$${Math.round(at.reduce((a,x)=>a+x.section_avg,0)/at.length)}</span></div>`:''}
      ${li[0]?`<div class="panel-row"><span class="panel-label">Listings</span><span class="panel-val">${li[0].total_listings.toLocaleString()}</span></div>`:''}
      <div class="panel-row"><span class="panel-label">Data Points</span><span class="panel-val">${s.length}</span></div>
      ${!fl[0]?'<div class="panel-empty">No price data yet</div>':''}
    </div>
    <div class="panel"><div class="panel-title">${isPri?'Secondary — StubHub':'Primary — Ticketmaster'}</div>
      <div class="panel-empty">Visit this event on StubHub to collect resale data</div>
    </div>`;
  const secSnaps=s.filter(x=>x.section);
  const bySec={};
  secSnaps.forEach(x=>{if(!bySec[x.section])bySec[x.section]={f:[],a:[],c:[],l:[]};if(x.section_floor>0)bySec[x.section].f.push(x.section_floor);if(x.section_avg>0)bySec[x.section].a.push(x.section_avg);if(x.section_ceiling>0)bySec[x.section].c.push(x.section_ceiling);if(x.section_listings>0)bySec[x.section].l.push(x.section_listings);});
  const avg=a=>a.length?Math.round(a.reduce((x,y)=>x+y,0)/a.length):null;
  const secs=Object.entries(bySec).map(([sec,d])=>({sec,f:avg(d.f),a:avg(d.a),c:avg(d.c),l:d.l.length?d.l[d.l.length-1]:null})).sort((a,b)=>(a.f||9999)-(b.f||9999));
  document.getElementById('d-table').innerHTML=secs.length?`<table><thead><tr><th>Section</th><th>Floor</th><th>ATP</th><th>Ceiling</th><th>Listings</th></tr></thead><tbody>${secs.map(s=>`<tr><td>${s.sec}</td><td class="gold">${s.f?'$'+s.f:'—'}</td><td>${s.a?'$'+s.a:'—'}</td><td>${s.c?'$'+s.c:'—'}</td><td>${s.l??'—'}</td></tr>`).join('')}</tbody></table>`:'<div class="empty" style="color:#333;font-size:12px;padding:2rem;">No section data yet</div>';
}

function showList(){
  document.getElementById('main-view').style.display='block';
  document.getElementById('detail').style.display='none';
}

load();
</script>
</body>
</html>
