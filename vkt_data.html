<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VKT Market Data</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { height:100%; }
    body {
      font-family:Arial,sans-serif;
      background:#f7f6f3;
      color:#1a1a1a;
      min-height:100vh;
    }

    nav {
      background:#fff;
      border-bottom:1px solid #e4e2dc;
      padding:0 1rem;
      height:56px;
      display:flex;
      align-items:center;
      justify-content:space-between;
    }

    .logo {
      font-size:12px;
      font-weight:700;
      letter-spacing:4px;
      text-transform:uppercase;
      color:#111;
    }
    .logo span { color:#d4a843; }

    .header {
      padding:1rem;
      background:#fff;
      border-bottom:1px solid #e4e2dc;
    }

    h1 {
      font-size:22px;
      font-weight:300;
      color:#111;
    }
    h1 strong { color:#d4a843; }

    #app {
      min-height:calc(100vh - 112px);
    }

    .toolbar {
      padding:0.75rem 1rem;
      background:#fff;
      border-bottom:1px solid #e4e2dc;
      display:grid;
      grid-template-columns:1.5fr 1fr 1fr 1fr 1fr 1fr 1fr;
      gap:10px;
    }

    .toolbar input,
    .toolbar select,
    .toolbar button,
    .back-btn,
    .section-select {
      padding:10px 12px;
      border:1px solid #d8d4cc;
      background:#fff;
      font-size:13px;
      outline:none;
      border-radius:6px;
      text-decoration:none;
      color:#111;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      min-height:40px;
      width:100%;
    }

    .toolbar input:focus,
    .toolbar select:focus,
    .toolbar button:hover,
    .back-btn:hover,
    .section-select:focus {
      border-color:#d4a843;
      background:#fcf8f0;
    }

    .date-filter-group {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      grid-column:span 2;
    }

    .date-input-wrap {
      display:flex;
      flex-direction:column;
      gap:4px;
    }

    .date-label {
      font-size:11px;
      color:#666;
      padding-left:2px;
    }

    .summary-bar {
      padding:0.625rem 1rem;
      background:#fcfbf8;
      border-bottom:1px solid #e4e2dc;
      font-size:12px;
      color:#111;
      display:flex;
      gap:24px;
      flex-wrap:wrap;
      margin:0;
    }

    .summary-bar strong {
      color:#d4a843;
      font-weight:700;
    }

    .dashboard-shell {
      padding:10px;
      background:#f7f6f3;
    }

    .dashboard-card {
      background:#fff;
      border:1px solid #e4e2dc;
      border-radius:10px;
      overflow:hidden;
    }

    .table-wrap {
      padding:0;
      margin:0;
      overflow:auto;
      height:calc(100vh - 56px - 56px - 110px - 44px - 20px);
      min-height:500px;
      background:#fff;
      display:block;
    }

    #tableContainer {
      padding:0;
      margin:0;
      background:#fff;
      width:100%;
      height:100%;
      display:block;
    }

    table {
      width:100%;
      border-collapse:collapse;
      border-spacing:0;
      background:#fff;
      border:none;
      table-layout:fixed;
      margin:0;
    }

    thead th {
      background:#f3f1ec;
      border-bottom:1px solid #e4e2dc;
      padding:10px 8px;
      font-size:10px;
      letter-spacing:0.7px;
      text-transform:uppercase;
      color:#111;
      text-align:left;
      position:sticky;
      top:0;
      z-index:2;
      font-weight:700;
      white-space:normal;
      line-height:1.2;
    }

    tbody td {
      padding:10px 8px;
      border-bottom:1px solid #efede8;
      font-size:12px;
      vertical-align:middle;
      text-align:left;
      color:#111;
      background:#fff;
      overflow-wrap:anywhere;
      word-break:break-word;
    }

    tbody tr:hover { background:#fcf8f0; }
    tbody tr:hover td { background:#fcf8f0; }

    .clickable-row { cursor:pointer; }

    .gold { color:#d4a843; font-weight:700; }
    .mono { font-family:monospace; }
    .muted { color:#666; }
    .right { text-align:right; }
    .center { text-align:center; }

    .event-name {
      font-weight:700;
      font-size:12px;
      text-align:left;
      white-space:normal;
      line-height:1.3;
      color:#111;
    }

    .tag {
      display:inline-block;
      font-size:10px;
      padding:3px 6px;
      border-radius:999px;
      background:#f3efe4;
      color:#8a6a18;
      font-weight:700;
      max-width:100%;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .msg {
      padding:3rem;
      text-align:center;
      color:#777;
      background:#fff;
      border:none;
    }

    .analysis-shell { padding:1rem; }

    .analysis-topbar {
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      margin-bottom:1rem;
      flex-wrap:wrap;
    }

    .analysis-title-wrap {
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .analysis-title {
      font-size:28px;
      font-weight:700;
      line-height:1.2;
      color:#111;
    }

    .analysis-subtitle {
      font-size:14px;
      color:#777;
    }

    .stats-grid {
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:14px;
      margin:18px 0;
    }

    .stat-card {
      background:#fff;
      border:1px solid #e7e3da;
      border-radius:14px;
      padding:16px;
    }

    .stat-label {
      font-size:11px;
      color:#888;
      text-transform:uppercase;
      letter-spacing:.8px;
      margin-bottom:8px;
    }

    .stat-value {
      font-size:28px;
      font-weight:700;
      line-height:1.1;
      color:#111;
    }

    .delta-up { color:#0a7a2f; font-weight:700; }
    .delta-down { color:#b42318; font-weight:700; }
    .delta-flat { color:#888; font-weight:700; }

    .analysis-grid {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:16px;
      margin-top:14px;
    }

    .full-width { grid-column:1 / -1; }

    .card {
      background:#fff;
      border:1px solid #e7e3da;
      border-radius:14px;
      padding:16px;
    }

    .card h3 {
      font-size:15px;
      margin-bottom:14px;
      color:#111;
    }

    .chart-wrap {
      position:relative;
      height:320px;
    }

    .mini-table-wrap {
      overflow:auto;
      max-height:420px;
      border:1px solid #efede8;
      border-radius:10px;
    }

    .mini-table {
      min-width:100%;
      border-collapse:collapse;
      background:#fff;
      table-layout:auto;
    }

    .mini-table th,
    .mini-table td {
      padding:9px 10px;
      border-bottom:1px solid #f0ede7;
      font-size:12px;
      text-align:left;
      white-space:nowrap;
      color:#111;
    }

    .analysis-list {
      display:grid;
      gap:10px;
      font-size:14px;
      color:#111;
    }

    .analysis-list strong { color:#111; }

    .section-chart-header {
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:14px;
    }

    .section-chart-grid {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:16px;
    }

    .empty-note {
      color:#888;
      font-size:13px;
      padding:10px 0 0;
    }

    @media (max-width:1450px) {
      .toolbar {
        grid-template-columns:1.4fr 1fr 1fr 1fr 1fr 1fr;
      }
      .date-filter-group { grid-column:span 2; }
    }

    @media (max-width:1200px) {
      .toolbar {
        grid-template-columns:1fr 1fr 1fr;
      }
      .date-filter-group { grid-column:span 2; }
      .table-wrap {
        height:auto;
        min-height:calc(100vh - 260px);
      }
    }

    @media (max-width:1100px) {
      .stats-grid {
        grid-template-columns:repeat(2,1fr);
      }
      .analysis-grid,
      .section-chart-grid {
        grid-template-columns:1fr;
      }
      .full-width { grid-column:auto; }
    }

    @media (max-width:700px) {
      .toolbar,
      .stats-grid,
      .date-filter-group {
        grid-template-columns:1fr;
      }

      nav,
      .header,
      .toolbar,
      .summary-bar,
      .analysis-shell {
        padding-left:0.75rem;
        padding-right:0.75rem;
      }

      .dashboard-shell { padding:8px; }
      .analysis-title { font-size:22px; }
      .table-wrap { min-height:calc(100vh - 300px); }

      table {
        table-layout:auto;
      }
    }
  </style>
</head>
<body>
  <nav>
    <div class="logo">Victory Kay <span>Tickets</span></div>
    <a href="/" style="color:#888;font-size:11px;text-decoration:none;">Back</a>
  </nav>

  <div class="header">
    <h1><strong>VKT</strong> Market Data</h1>
  </div>

  <div id="app"></div>

  <script>
    var SB  = 'https://unypasitbzulafehbqtj.supabase.co';
    var KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVueXBhc2l0Ynp1bGFmZWhicXRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwMTE2MjAsImV4cCI6MjA5MDU4NzYyMH0.ywGB7ZccbVxcgZDXMOQB9Ui8R-SF4xF0SKkWavDbRGI';
    var H   = { apikey: KEY, Authorization: 'Bearer ' + KEY };

    var dashboardRows = [];
    var dashboardEvents = [];
    var dashboardSnapshots = [];

    var floorChart = null;
    var listingsChart = null;
    var atpChart = null;
    var sectionListingsChart = null;
    var sectionAvgChart = null;

    function get(url) {
      return fetch(SB + url, { headers: H }).then(function(r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      });
    }

    function safeNumber(v) {
      var n = Number(v);
      return isNaN(n) ? 0 : n;
    }

    function formatCurrency(v) {
      if (!v || isNaN(v)) return '—';
      return '$' + Math.round(v).toLocaleString();
    }

    function formatInteger(v) {
      if (v === null || v === undefined || isNaN(v)) return '—';
      return Number(v).toLocaleString();
    }

    function formatDate(dateStr) {
      if (!dateStr) return 'No date';
      var d = new Date(dateStr + 'T12:00:00');
      if (isNaN(d.getTime())) return dateStr;
      return d.toLocaleDateString('en-US', {
        weekday:'short',
        month:'short',
        day:'numeric',
        year:'numeric'
      });
    }

    function formatDateTime(dtStr) {
      if (!dtStr) return '';
      var d = new Date(dtStr);
      if (isNaN(d.getTime())) return dtStr;
      return d.toLocaleString('en-US', {
        month:'short',
        day:'numeric',
        year:'numeric',
        hour:'numeric',
        minute:'2-digit'
      });
    }

    function shortVenue(venue) {
      if (!venue) return '';
      return venue.split(',')[0];
    }

    function cleanEventName(name) {
      if (!name) return '';
      return name
        .replace(/Tickets\s*[–-]\s*\w+\s+\d+\s+\d{4}\s+at\s+/i, ' at ')
        .replace(/Tickets\s*[–-]\s*/i, '')
        .trim();
    }

    function detectCategory(name, venue) {
      var text = ((name || '') + ' ' + (venue || '')).toLowerCase();
      if (text.includes('mlb') || text.includes('baseball') || text.includes('yankees') || text.includes('dodgers') || text.includes('cubs') || text.includes('red sox')) return 'MLB';
      if (text.includes('nba') || text.includes('basketball') || text.includes('lakers') || text.includes('warriors') || text.includes('celtics') || text.includes('knicks')) return 'NBA';
      if (text.includes('nfl') || text.includes('football') || text.includes('cowboys') || text.includes('49ers') || text.includes('chiefs') || text.includes('eagles')) return 'NFL';
      if (text.includes('nhl') || text.includes('hockey') || text.includes('rangers') || text.includes('kings') || text.includes('bruins')) return 'NHL';
      if (text.includes('mls') || text.includes('soccer') || text.includes('galaxy') || text.includes('lafc') || text.includes('inter miami')) return 'MLS';
      if (text.includes('fifa') || text.includes('world cup')) return 'FIFA';
      if (text.includes('comedy')) return 'Comedy';
      if (text.includes('theater') || text.includes('theatre') || text.includes('broadway')) return 'Theater';
      if (text.includes('show')) return 'Show';
      if (text.includes('concert') || text.includes('tour') || text.includes('live')) return 'Concert';
      return 'Other';
    }

    function parsePerformerOpponent(name) {
      var cleaned = cleanEventName(name || '');

      var atMatch = cleaned.match(/^(.*?)\s+at\s+(.*?)$/i);
      if (atMatch) {
        return {
          performer: atMatch[2].trim(),
          opponent: atMatch[1].trim()
        };
      }

      var vsMatch = cleaned.match(/^(.*?)\s+(?:vs\.?|v\.?)\s+(.*?)$/i);
      if (vsMatch) {
        return {
          performer: vsMatch[1].trim(),
          opponent: vsMatch[2].trim()
        };
      }

      return {
        performer: cleaned,
        opponent: ''
      };
    }

    function escapeHtml(str) {
      return String(str == null ? '' : str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function parseDateOnly(dateStr) {
      if (!dateStr) return null;
      var d = new Date(dateStr + 'T12:00:00');
      return isNaN(d.getTime()) ? null : d;
    }

    function matchesDateRange(row, fromDate, toDate) {
      if (!fromDate && !toDate) return true;
      var eventDate = parseDateOnly(row.date);
      if (!eventDate) return false;

      if (fromDate) {
        var from = parseDateOnly(fromDate);
        if (from && eventDate < from) return false;
      }

      if (toDate) {
        var to = parseDateOnly(toDate);
        if (to && eventDate > to) return false;
      }

      return true;
    }

    function statCard(label, value, deltaHtml) {
      return '' +
        '<div class="stat-card">' +
          '<div class="stat-label">' + escapeHtml(label) + '</div>' +
          '<div class="stat-value">' + escapeHtml(value) + '</div>' +
          (deltaHtml || '') +
        '</div>';
    }

    function deltaClass(v) {
      if (v > 0) return 'delta-up';
      if (v < 0) return 'delta-down';
      return 'delta-flat';
    }

    function deltaText(v, money) {
      if (!v || isNaN(v)) return '0';
      var abs = Math.abs(v);
      var prefix = v > 0 ? '+' : '-';
      return money ? prefix + '$' + Math.round(abs).toLocaleString() : prefix + Math.round(abs).toLocaleString();
    }

    function getQueryParam(name) {
      var params = new URLSearchParams(window.location.search);
      return params.get(name);
    }

    function buildDashboardRows(events, snaps) {
      var junk = /hotel|voucher|credential|postgame|nfl football|nba basketball|nhl hockey|mlb baseball/i;

      return (events || [])
        .filter(function(e) {
          return e.name && e.name.length > 3 && !junk.test(e.name);
        })
        .map(function(ev) {
          var evSnaps = snaps.filter(function(s) { return s.event_id === ev.id; });
          var latest = evSnaps.length ? evSnaps[evSnaps.length - 1] : null;
          var atps = evSnaps.filter(function(x) { return safeNumber(x.section_avg) > 0; });

          var latestFloor = latest ? safeNumber(latest.event_floor) : 0;
          var listings = latest ? safeNumber(latest.total_listings) : 0;
          var atp = atps.length
            ? atps.reduce(function(sum, x) { return sum + safeNumber(x.section_avg); }, 0) / atps.length
            : 0;

          var cleanName = cleanEventName(ev.name);
          var venue = ev.venue || '';
          var parsed = parsePerformerOpponent(cleanName);

          return {
            id: ev.id,
            name: cleanName,
            raw_name: ev.name,
            date: ev.date || '',
            venue: shortVenue(venue),
            full_venue: venue,
            event_floor: latestFloor,
            atp: atp,
            listings: listings,
            category: detectCategory(cleanName, venue),
            performer: parsed.performer,
            opponent: parsed.opponent
          };
        })
        .filter(function(row) {
          return safeNumber(row.listings) > 0;
        });
    }

    function getUniqueValues(rows, field) {
      var values = rows
        .map(function(r) { return (r[field] || '').trim(); })
        .filter(function(v) { return v.length > 0; });

      return Array.from(new Set(values)).sort(function(a, b) {
        return a.localeCompare(b);
      });
    }

    function fillSelectOptions(selectId, values, defaultLabel) {
      var el = document.getElementById(selectId);
      if (!el) return;

      var currentValue = el.value || '';
      var html = '<option value="">' + escapeHtml(defaultLabel) + '</option>';

      values.forEach(function(value) {
        html += '<option value="' + escapeHtml(value) + '">' + escapeHtml(value) + '</option>';
      });

      el.innerHTML = html;

      if (values.indexOf(currentValue) !== -1) {
        el.value = currentValue;
      }
    }

    function renderDashboardShell() {
      var app = document.getElementById('app');
      app.innerHTML = ''
        + '<div class="toolbar">'
        + '  <input type="text" id="search" placeholder="Search event, venue, team..." />'
        + '  <select id="leagueFilter">'
        + '    <option value="">All Categories</option>'
        + '    <option value="MLB">MLB</option>'
        + '    <option value="NBA">NBA</option>'
        + '    <option value="NFL">NFL</option>'
        + '    <option value="NHL">NHL</option>'
        + '    <option value="MLS">MLS</option>'
        + '    <option value="FIFA">FIFA</option>'
        + '    <option value="Concert">Concert</option>'
        + '    <option value="Show">Show</option>'
        + '    <option value="Theater">Theater</option>'
        + '    <option value="Comedy">Comedy</option>'
        + '    <option value="Other">Other</option>'
        + '  </select>'
        + '  <select id="performerFilter"><option value="">All Performers</option></select>'
        + '  <select id="opponentFilter"><option value="">All Opponents</option></select>'
        + '  <select id="venueFilter"><option value="">All Venues</option></select>'
        + '  <div class="date-filter-group">'
        + '    <div class="date-input-wrap">'
        + '      <label class="date-label" for="dateFrom">Date From</label>'
        + '      <input type="date" id="dateFrom" />'
        + '    </div>'
        + '    <div class="date-input-wrap">'
        + '      <label class="date-label" for="dateTo">Date To</label>'
        + '      <input type="date" id="dateTo" />'
        + '    </div>'
        + '  </div>'
        + '  <select id="sortField">'
        + '    <option value="event_floor">Sort: Floor</option>'
        + '    <option value="atp">Sort: ATP</option>'
        + '    <option value="listings">Sort: Listings</option>'
        + '    <option value="name">Sort: Event Name</option>'
        + '    <option value="venue">Sort: Venue</option>'
        + '    <option value="performer">Sort: Performer</option>'
        + '    <option value="opponent">Sort: Opponent</option>'
        + '  </select>'
        + '</div>'
        + '<div class="summary-bar" id="summaryBar"><span>Loading...</span></div>'
        + '<div class="dashboard-shell"><div class="dashboard-card"><div class="table-wrap"><div id="tableContainer" class="msg">Loading...</div></div></div></div>';

      [
        'search',
        'leagueFilter',
        'performerFilter',
        'opponentFilter',
        'venueFilter',
        'dateFrom',
        'dateTo',
        'sortField'
      ].forEach(function(id) {
        var el = document.getElementById(id);
        el.addEventListener('input', renderDashboardTable);
        el.addEventListener('change', renderDashboardTable);
      });
    }

    function hydrateDashboardFilters() {
      fillSelectOptions('performerFilter', getUniqueValues(dashboardRows, 'performer'), 'All Performers');
      fillSelectOptions('opponentFilter', getUniqueValues(dashboardRows, 'opponent'), 'All Opponents');
      fillSelectOptions('venueFilter', getUniqueValues(dashboardRows, 'venue'), 'All Venues');
    }

    function renderDashboardTable() {
      var rows = dashboardRows.slice();

      var search = document.getElementById('search').value.trim().toLowerCase();
      var league = document.getElementById('leagueFilter').value;
      var performer = document.getElementById('performerFilter').value;
      var opponent = document.getElementById('opponentFilter').value;
      var venue = document.getElementById('venueFilter').value;
      var dateFrom = document.getElementById('dateFrom').value;
      var dateTo = document.getElementById('dateTo').value;
      var sortField = document.getElementById('sortField').value;

      rows = rows.filter(function(row) {
        var haystack = [
          row.name,
          row.raw_name,
          row.venue,
          row.full_venue,
          row.category,
          row.date,
          row.performer,
          row.opponent
        ].join(' ').toLowerCase();

        var matchesSearch = !search || haystack.includes(search);
        var matchesLeague = !league || row.category === league;
        var matchesPerformer = !performer || row.performer === performer;
        var matchesOpponent = !opponent || row.opponent === opponent;
        var matchesVenue = !venue || row.venue === venue;
        var matchesDates = matchesDateRange(row, dateFrom, dateTo);

        return matchesSearch &&
          matchesLeague &&
          matchesPerformer &&
          matchesOpponent &&
          matchesVenue &&
          matchesDates &&
          safeNumber(row.listings) > 0;
      });

      rows.sort(function(a, b) {
        var av = a[sortField];
        var bv = b[sortField];

        if (
          sortField === 'name' ||
          sortField === 'venue' ||
          sortField === 'category' ||
          sortField === 'performer' ||
          sortField === 'opponent'
        ) {
          av = (av || '').toString().toLowerCase();
          bv = (bv || '').toString().toLowerCase();
          if (av < bv) return -1;
          if (av > bv) return 1;
          return 0;
        }

        av = safeNumber(av);
        bv = safeNumber(bv);

        return bv - av;
      });

      if (!rows.length) {
        document.getElementById('tableContainer').innerHTML = '<div class="msg">No events match the current filters.</div>';
        document.getElementById('summaryBar').innerHTML = '<span>0 events</span>';
        return;
      }

      var html = '';
      html += '<table>';
      html += '<colgroup>';
      html += '<col style="width:24%">';
      html += '<col style="width:8%">';
      html += '<col style="width:14%">';
      html += '<col style="width:14%">';
      html += '<col style="width:11%">';
      html += '<col style="width:13%">';
      html += '<col style="width:5.5%">';
      html += '<col style="width:5.5%">';
      html += '<col style="width:5%">';
      html += '</colgroup>';
      html += '<thead><tr>';
      html += '<th>Event</th>';
      html += '<th>Category</th>';
      html += '<th>Performer</th>';
      html += '<th>Opponent</th>';
      html += '<th>Date</th>';
      html += '<th>Venue</th>';
      html += '<th class="right">Floor</th>';
      html += '<th class="right">ATP</th>';
      html += '<th class="right">Listings</th>';
      html += '</tr></thead>';
      html += '<tbody>';

      rows.forEach(function(row) {
        var analysisUrl = window.location.pathname + '?event_id=' + encodeURIComponent(row.id);
        html += '<tr class="clickable-row" onclick="window.location.href=\'' + analysisUrl.replace(/'/g, "\\'") + '\'">';
        html += '<td><div class="event-name">' + escapeHtml(row.name || '—') + '</div></td>';
        html += '<td><span class="tag">' + escapeHtml(row.category) + '</span></td>';
        html += '<td>' + escapeHtml(row.performer || '—') + '</td>';
        html += '<td>' + escapeHtml(row.opponent || '—') + '</td>';
        html += '<td>' + escapeHtml(formatDate(row.date)) + '</td>';
        html += '<td>' + escapeHtml(row.venue || '—') + '</td>';
        html += '<td class="right gold mono">' + escapeHtml(formatCurrency(row.event_floor)) + '</td>';
        html += '<td class="right mono">' + escapeHtml(formatCurrency(row.atp)) + '</td>';
        html += '<td class="right mono">' + escapeHtml(formatInteger(row.listings)) + '</td>';
        html += '</tr>';
      });

      html += '</tbody></table>';
      document.getElementById('tableContainer').innerHTML = html;

      var count = rows.length;
      var avgFloor = count ? rows.reduce(function(sum, r) { return sum + safeNumber(r.event_floor); }, 0) / count : 0;
      var avgAtp = count ? rows.reduce(function(sum, r) { return sum + safeNumber(r.atp); }, 0) / count : 0;
      var totalListings = rows.reduce(function(sum, r) { return sum + safeNumber(r.listings); }, 0);

      document.getElementById('summaryBar').innerHTML =
        '<span><strong>Events:</strong> ' + count.toLocaleString() + '</span>' +
        '<span><strong>Avg Floor:</strong> ' + formatCurrency(avgFloor) + '</span>' +
        '<span><strong>Avg ATP:</strong> ' + formatCurrency(avgAtp) + '</span>' +
        '<span><strong>Total Listings:</strong> ' + totalListings.toLocaleString() + '</span>';
    }

    function renderAnalysisShell() {
      var app = document.getElementById('app');
      app.innerHTML = '<div class="analysis-shell"><div class="msg">Loading analysis...</div></div>';
    }

    function destroyCharts() {
      if (floorChart) { floorChart.destroy(); floorChart = null; }
      if (listingsChart) { listingsChart.destroy(); listingsChart = null; }
      if (atpChart) { atpChart.destroy(); atpChart = null; }
      if (sectionListingsChart) { sectionListingsChart.destroy(); sectionListingsChart = null; }
      if (sectionAvgChart) { sectionAvgChart.destroy(); sectionAvgChart = null; }
    }

    function chartOptions(yTitle) {
      return {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: { legend: { display: true } },
        scales: {
          x: { ticks: { maxTicksLimit: 8 } },
          y: { title: { display: true, text: yTitle } }
        }
      };
    }

    function drawAnalysisCharts(labels, floorData, listingsData, atpData) {
      destroyCharts();

      floorChart = new Chart(document.getElementById('floorChart'), {
        type: 'line',
        data: {
          labels: labels,
          datasets: [{
            label: 'Floor',
            data: floorData,
            borderColor: '#d4a843',
            backgroundColor: 'rgba(212,168,67,.12)',
            borderWidth: 2,
            tension: .25,
            fill: true,
            pointRadius: 2
          }]
        },
        options: chartOptions('Price')
      });

      listingsChart = new Chart(document.getElementById('listingsChart'), {
        type: 'line',
        data: {
          labels: labels,
          datasets: [{
            label: 'Listings',
            data: listingsData,
            borderColor: '#3b82f6',
            backgroundColor: 'rgba(59,130,246,.10)',
            borderWidth: 2,
            tension: .25,
            fill: true,
            pointRadius: 2
          }]
        },
        options: chartOptions('Listings')
      });

      atpChart = new Chart(document.getElementById('atpChart'), {
        type: 'line',
        data: {
          labels: labels,
          datasets: [{
            label: 'ATP / Section Avg',
            data: atpData,
            borderColor: '#10b981',
            backgroundColor: 'rgba(16,185,129,.10)',
            borderWidth: 2,
            tension: .25,
            fill: true,
            pointRadius: 2
          }]
        },
        options: chartOptions('ATP')
      });
    }

    function drawSectionChartsForSelection(sectionName, snaps) {
      if (sectionListingsChart) { sectionListingsChart.destroy(); sectionListingsChart = null; }
      if (sectionAvgChart) { sectionAvgChart.destroy(); sectionAvgChart = null; }

      var sectionSnaps = snaps
        .filter(function(s) { return (s.section || '') === sectionName; })
        .sort(function(a, b) { return new Date(a.scraped_at) - new Date(b.scraped_at); });

      var noteEl = document.getElementById('sectionChartNote');
      if (!sectionSnaps.length) {
        noteEl.innerHTML = 'No data found for the selected section.';
        return;
      }

      noteEl.innerHTML = '';

      var labels = sectionSnaps.map(function(s) { return formatDateTime(s.scraped_at); });
      var listingsData = sectionSnaps.map(function(s) { return safeNumber(s.section_listings); });
      var avgData = sectionSnaps.map(function(s) { return safeNumber(s.section_avg); });

      sectionListingsChart = new Chart(document.getElementById('sectionListingsChart'), {
        type: 'line',
        data: {
          labels: labels,
          datasets: [{
            label: sectionName + ' Listings',
            data: listingsData,
            borderColor: '#8b5cf6',
            backgroundColor: 'rgba(139,92,246,.10)',
            borderWidth: 2,
            tension: .25,
            fill: true,
            pointRadius: 2
          }]
        },
        options: chartOptions('Section Listings')
      });

      sectionAvgChart = new Chart(document.getElementById('sectionAvgChart'), {
        type: 'line',
        data: {
          labels: labels,
          datasets: [{
            label: sectionName + ' Avg Price',
            data: avgData,
            borderColor: '#ef4444',
            backgroundColor: 'rgba(239,68,68,.10)',
            borderWidth: 2,
            tension: .25,
            fill: true,
            pointRadius: 2
          }]
        },
        options: chartOptions('Section Avg Price')
      });
    }

    function loadDashboard() {
      renderDashboardShell();

      get('/rest/v1/volume_snapshots?order=scraped_at.desc&limit=200&select=event_id')
        .then(function(snaps) {
          var ids = [];
          var seen = {};

          (snaps || []).forEach(function(s) {
            if (s.event_id && !seen[s.event_id]) {
              seen[s.event_id] = true;
              ids.push(s.event_id);
            }
          });

          ids = ids.slice(0, 100);

          if (!ids.length) {
            document.getElementById('tableContainer').innerHTML = '<div class="msg">No data yet. Visit StubHub event pages to start collecting.</div>';
            document.getElementById('summaryBar').innerHTML = '<span>No data found.</span>';
            return null;
          }

          var idList = ids.map(function(i) {
            return '"' + String(i).replace(/"/g, '\\"') + '"';
          }).join(',');

          return Promise.all([
            get('/rest/v1/events?id=in.(' + idList + ')&select=id,name,date,venue'),
            get('/rest/v1/volume_snapshots?event_id=in.(' + idList + ')&order=scraped_at.asc&limit=5000&select=event_id,total_listings,section_listings,event_floor,section_avg,section,scraped_at')
          ]);
        })
        .then(function(results) {
          if (!results) return;
          dashboardEvents = results[0] || [];
          dashboardSnapshots = results[1] || [];
          dashboardRows = buildDashboardRows(dashboardEvents, dashboardSnapshots);
          hydrateDashboardFilters();
          renderDashboardTable();
        })
        .catch(function(err) {
          console.error(err);
          document.getElementById('tableContainer').innerHTML = '<div class="msg">Failed to load data: ' + escapeHtml(err.message || 'Unknown error') + '</div>';
          document.getElementById('summaryBar').innerHTML = '<span>Error loading market data.</span>';
        });
    }

    function loadAnalysis(eventId) {
      renderAnalysisShell();

      Promise.all([
        get('/rest/v1/events?id=eq.' + encodeURIComponent(eventId) + '&select=id,name,date,venue'),
        get('/rest/v1/volume_snapshots?event_id=eq.' + encodeURIComponent(eventId) + '&order=scraped_at.asc&limit=10000&select=event_id,total_listings,section_listings,event_floor,section_avg,section,scraped_at')
      ])
      .then(function(results) {
        var events = results[0] || [];
        var snaps = results[1] || [];
        var eventMeta = events[0];

        if (!eventMeta) {
          document.getElementById('app').innerHTML = '<div class="analysis-shell"><div class="msg">Event not found.</div></div>';
          return;
        }

        if (!snaps.length) {
          document.getElementById('app').innerHTML = '<div class="analysis-shell"><div class="msg">No snapshot data found for this event.</div></div>';
          return;
        }

        var firstSnap = snaps[0];
        var lastSnap = snaps[snaps.length - 1];

        var floorStart = safeNumber(firstSnap.event_floor);
        var floorEnd = safeNumber(lastSnap.event_floor);
        var floorDelta = floorEnd - floorStart;

        var listingStart = safeNumber(firstSnap.total_listings);
        var listingEnd = safeNumber(lastSnap.total_listings);
        var listingDelta = listingEnd - listingStart;

        var validAtpRows = snaps.filter(function(s) { return safeNumber(s.section_avg) > 0; });
        var avgAtpOverall = validAtpRows.length
          ? validAtpRows.reduce(function(sum, s) { return sum + safeNumber(s.section_avg); }, 0) / validAtpRows.length
          : 0;

        var latestBySection = {};
        snaps.forEach(function(s) {
          if (!s.section) return;
          latestBySection[s.section] = s;
        });

        var sections = Object.keys(latestBySection).map(function(section) {
          var s = latestBySection[section];
          return {
            section: section,
            listings: safeNumber(s.section_listings),
            avg: safeNumber(s.section_avg),
            floor: safeNumber(s.event_floor),
            scraped_at: s.scraped_at
          };
        });

        sections.sort(function(a, b) {
          return b.listings - a.listings;
        });

        var uniqueSections = Array.from(new Set(
          snaps
            .map(function(s) { return s.section || ''; })
            .filter(function(s) { return s.trim().length > 0; })
        )).sort();

        var labels = snaps.map(function(s) { return formatDateTime(s.scraped_at); });
        var floorData = snaps.map(function(s) { return safeNumber(s.event_floor); });
        var listingsData = snaps.map(function(s) { return safeNumber(s.total_listings); });
        var atpData = snaps.map(function(s) { return safeNumber(s.section_avg); });

        var html = '';
        html += '<div class="analysis-shell">';
        html += '  <div class="analysis-topbar">';
        html += '    <div class="analysis-title-wrap">';
        html += '      <div class="analysis-title">' + escapeHtml(eventMeta.name) + '</div>';
        html += '      <div class="analysis-subtitle">' + escapeHtml(formatDate(eventMeta.date)) + (eventMeta.venue ? ' • ' + escapeHtml(eventMeta.venue) : '') + '</div>';
        html += '    </div>';
        html += '    <a class="back-btn" href="' + window.location.pathname + '">← Back to Dashboard</a>';
        html += '  </div>';

        html += '  <div class="stats-grid">';
        html +=       statCard('Current Floor', formatCurrency(floorEnd), '<div class="' + deltaClass(floorDelta) + '" style="margin-top:8px;font-size:12px;">' + deltaText(floorDelta, true) + '</div>');
        html +=       statCard('Current Listings', formatInteger(listingEnd), '<div class="' + deltaClass(listingDelta) + '" style="margin-top:8px;font-size:12px;">' + deltaText(listingDelta, false) + '</div>');
        html +=       statCard('Avg ATP', formatCurrency(avgAtpOverall), '');
        html +=       statCard('Snapshots Collected', formatInteger(snaps.length), '');
        html += '  </div>';

        html += '  <div class="analysis-grid">';
        html += '    <div class="card">';
        html += '      <h3>Floor Over Time</h3>';
        html += '      <div class="chart-wrap"><canvas id="floorChart"></canvas></div>';
        html += '    </div>';

        html += '    <div class="card">';
        html += '      <h3>Listings Over Time</h3>';
        html += '      <div class="chart-wrap"><canvas id="listingsChart"></canvas></div>';
        html += '    </div>';

        html += '    <div class="card full-width">';
        html += '      <h3>ATP / Section Average Over Time</h3>';
        html += '      <div class="chart-wrap"><canvas id="atpChart"></canvas></div>';
        html += '    </div>';

        html += '    <div class="card full-width">';
        html += '      <div class="section-chart-header">';
        html += '        <h3 style="margin-bottom:0;">Section-Level Analysis</h3>';
        html += '        <select id="sectionFilter" class="section-select">';
        if (!uniqueSections.length) {
          html += '          <option value="">No sections available</option>';
        } else {
          uniqueSections.forEach(function(section, idx) {
            html += '        <option value="' + escapeHtml(section) + '"' + (idx === 0 ? ' selected' : '') + '>' + escapeHtml(section) + '</option>';
          });
        }
        html += '        </select>';
        html += '      </div>';
        html += '      <div class="section-chart-grid">';
        html += '        <div>';
        html += '          <h3 style="margin-bottom:12px;">Selected Section Listings Over Time</h3>';
        html += '          <div class="chart-wrap"><canvas id="sectionListingsChart"></canvas></div>';
        html += '        </div>';
        html += '        <div>';
        html += '          <h3 style="margin-bottom:12px;">Selected Section Average Price Over Time</h3>';
        html += '          <div class="chart-wrap"><canvas id="sectionAvgChart"></canvas></div>';
        html += '        </div>';
        html += '      </div>';
        html += '      <div id="sectionChartNote" class="empty-note"></div>';
        html += '    </div>';

        html += '    <div class="card">';
        html += '      <h3>Event Analysis</h3>';
        html += '      <div class="analysis-list">';
        html += '        <div><strong>First Snapshot:</strong> ' + escapeHtml(formatDateTime(firstSnap.scraped_at)) + '</div>';
        html += '        <div><strong>Latest Snapshot:</strong> ' + escapeHtml(formatDateTime(lastSnap.scraped_at)) + '</div>';
        html += '        <div><strong>Opening Floor:</strong> ' + escapeHtml(formatCurrency(floorStart)) + '</div>';
        html += '        <div><strong>Latest Floor:</strong> ' + escapeHtml(formatCurrency(floorEnd)) + '</div>';
        html += '        <div><strong>Opening Listings:</strong> ' + escapeHtml(formatInteger(listingStart)) + '</div>';
        html += '        <div><strong>Latest Listings:</strong> ' + escapeHtml(formatInteger(listingEnd)) + '</div>';
        html += '        <div><strong>Floor Change:</strong> <span class="' + deltaClass(floorDelta) + '">' + deltaText(floorDelta, true) + '</span></div>';
        html += '        <div><strong>Listings Change:</strong> <span class="' + deltaClass(listingDelta) + '">' + deltaText(listingDelta, false) + '</span></div>';
        html += '        <div><strong>Event Date:</strong> ' + escapeHtml(formatDate(eventMeta.date)) + '</div>';
        html += '        <div><strong>Venue:</strong> ' + escapeHtml(eventMeta.venue || '') + '</div>';
        html += '        <div><strong>Event ID:</strong> <span class="mono">' + escapeHtml(eventMeta.id) + '</span></div>';
        html += '      </div>';
        html += '    </div>';

        html += '    <div class="card">';
        html += '      <h3>Latest Section Breakdown</h3>';
        html += '      <div class="mini-table-wrap">';
        html += '        <table class="mini-table">';
        html += '          <thead><tr><th>Section</th><th>Listings</th><th>Avg</th><th>Last Seen</th></tr></thead><tbody>';

        if (!sections.length) {
          html += '      <tr><td colspan="4" class="muted">No section data available.</td></tr>';
        } else {
          sections.forEach(function(s) {
            html += '    <tr>';
            html += '      <td>' + escapeHtml(s.section) + '</td>';
            html += '      <td>' + escapeHtml(formatInteger(s.listings)) + '</td>';
            html += '      <td>' + escapeHtml(formatCurrency(s.avg)) + '</td>';
            html += '      <td>' + escapeHtml(formatDateTime(s.scraped_at)) + '</td>';
            html += '    </tr>';
          });
        }

        html += '          </tbody></table>';
        html += '      </div>';
        html += '    </div>';

        html += '    <div class="card full-width">';
        html += '      <h3>Snapshot History</h3>';
        html += '      <div class="mini-table-wrap">';
        html += '        <table class="mini-table">';
        html += '          <thead><tr><th>Scraped At</th><th>Floor</th><th>Total Listings</th><th>Section</th><th>Section Listings</th><th>Section Avg</th></tr></thead><tbody>';

        snaps.forEach(function(s) {
          html += '        <tr>';
          html += '          <td>' + escapeHtml(formatDateTime(s.scraped_at)) + '</td>';
          html += '          <td>' + escapeHtml(formatCurrency(s.event_floor)) + '</td>';
          html += '          <td>' + escapeHtml(formatInteger(s.total_listings)) + '</td>';
          html += '          <td>' + escapeHtml(s.section || '') + '</td>';
          html += '          <td>' + escapeHtml(formatInteger(s.section_listings)) + '</td>';
          html += '          <td>' + escapeHtml(formatCurrency(s.section_avg)) + '</td>';
          html += '        </tr>';
        });

        html += '          </tbody>';
        html += '        </table>';
        html += '      </div>';
        html += '    </div>';

        html += '  </div>';
        html += '</div>';

        document.getElementById('app').innerHTML = html;
        drawAnalysisCharts(labels, floorData, listingsData, atpData);

        var sectionFilterEl = document.getElementById('sectionFilter');
        if (sectionFilterEl && uniqueSections.length) {
          drawSectionChartsForSelection(sectionFilterEl.value, snaps);
          sectionFilterEl.addEventListener('change', function() {
            drawSectionChartsForSelection(this.value, snaps);
          });
        } else {
          var noteEl = document.getElementById('sectionChartNote');
          if (noteEl) noteEl.innerHTML = 'No section-level data available for this event.';
        }
      })
      .catch(function(err) {
        console.error(err);
        document.getElementById('app').innerHTML = '<div class="analysis-shell"><div class="msg">Failed to load analysis: ' + escapeHtml(err.message || 'Unknown error') + '</div></div>';
      });
    }

    function init() {
      var eventId = getQueryParam('event_id');
      if (eventId) {
        loadAnalysis(eventId);
      } else {
        loadDashboard();
      }
    }

    init();
  </script>
</body>
</html>
