<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VKT Market Data</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: Arial, sans-serif; background:#f7f6f3; color:#1a1a1a; }
    nav { background:#fff; border-bottom:1px solid #e4e2dc; padding:0 2rem; height:56px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
    .logo { font-size:12px; font-weight:700; letter-spacing:4px; text-transform:uppercase; color:#0c0c0c; }
    .logo span { color:#d4a843; }
    .header { padding:2rem; border-bottom:1px solid #e4e2dc; background:#fff; }
    .title { font-size:24px; font-weight:300; margin-bottom:4px; color:#0c0c0c; }
    .title strong { color:#d4a843; }
    .subtitle { font-size:11px; color:#888; }
    .stats-row { display:flex; gap:1px; background:#e4e2dc; border:1px solid #e4e2dc; margin-top:1.5rem; }
    .stat { flex:1; background:#fff; padding:1rem 1.25rem; }
    .stat-val { font-size:22px; font-weight:700; color:#0c0c0c; font-family:monospace; }
    .stat-val.gold { color:#d4a843; }
    .stat-lbl { font-size:9px; letter-spacing:2px; text-transform:uppercase; color:#888; margin-top:3px; }

    .toolbar { padding:1rem 2rem; border-bottom:1px solid #e4e2dc; display:flex; gap:1rem; align-items:center; flex-wrap:wrap; background:#0c0c0c; position:sticky; top:56px; z-index:99; }
    input[type=text] { padding:7px 12px; background:#f7f6f3; border:1px solid #e4e2dc; color:#1a1a1a; font-size:12px; width:220px; outline:none; border-radius:2px; }
    input[type=text]:focus { border-color:#d4a843; }
    input::placeholder { color:#bbb; }
    select { padding:7px 10px; background:#f7f6f3; border:1px solid #e4e2dc; color:#555; font-size:11px; outline:none; cursor:pointer; border-radius:2px; }
    select:focus { border-color:#d4a843; }
    .lbl { font-size:9px; letter-spacing:2px; text-transform:uppercase; color:#888; }

    .main { padding:1.5rem 2rem; }
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:1px; background:#e4e2dc; }
    .card { background:#fff; padding:1.25rem; cursor:pointer; transition:all 0.15s; border-left:3px solid transparent; }
    .card:hover { background:#fdf9f2; border-left-color:#d4a843; }
    .card-name { font-size:14px; font-weight:600; color:#0c0c0c; margin-bottom:2px; line-height:1.3; }
    .card-orig { font-size:10px; color:#bbb; margin-bottom:8px; font-style:italic; }
    .card-meta { font-size:10px; color:#444; margin-bottom:12px; display:flex; gap:8px; flex-wrap:wrap; }
    .tag { padding:2px 6px; font-size:8px; font-weight:700; letter-spacing:1px; text-transform:uppercase; }
    .tag.date { background:#f0eeea; color:#888; }
    .tag.venue { background:#f0eeea; color:#888; }
    .tag.tm { background:#eef3fc; color:#1a4a8a; }
    .card-stats { display:grid; grid-template-columns:1fr 1fr 1fr; gap:1px; background:#e4e2dc; margin-bottom:1px; }
    .card-stat { background:#f7f6f3; padding:8px; text-align:center; }
    .card-stat-lbl { font-size:8px; letter-spacing:1px; text-transform:uppercase; color:#aaa; margin-bottom:3px; }
    .card-stat-val { font-size:16px; font-weight:700; font-family:monospace; color:#1a1a1a; }
    .card-stat-val.gold { color:#d4a843; }
    .card-stat-val.green { color:#4caf50; }
    .card-stat-val.red { color:#f44336; }
    .card-stat-val.dim { color:#555; }
    .card-change { display:grid; grid-template-columns:1fr 1fr; gap:1px; background:#e4e2dc; }
    .card-change-cell { background:#f0eeea; padding:6px 8px; text-align:center; }
    .card-change-lbl { font-size:7px; letter-spacing:1px; text-transform:uppercase; color:#bbb; margin-bottom:2px; }
    .card-change-val { font-size:11px; font-weight:700; font-family:monospace; color:#aaa; }
    .card-change-val.up { color:#4caf50; }
    .card-change-val.down { color:#f44336; }

    .loading-msg { padding:4rem; text-align:center; color:#aaa; font-size:11px; letter-spacing:3px; }
    .empty-msg { padding:4rem; text-align:center; color:#aaa; font-size:13px; }

    /* DETAIL */
    #detail { display:none; }
    .back { background:none; border:1px solid #e4e2dc; color:#888; padding:6px 14px; font-size:11px; cursor:pointer; font-family:Arial; margin-bottom:1.5rem; }
    .back:hover { border-color:#d4a843; color:#d4a843; }
    .d-name { font-size:22px; font-weight:700; margin-bottom:4px; color:#0c0c0c; }
    .d-sub { font-size:11px; color:#bbb; margin-bottom:6px; font-style:italic; }
    .d-meta { font-size:12px; color:#888; margin-bottom:1.5rem; }
    .d-strip { display:flex; gap:1px; background:#e4e2dc; border:1px solid #e4e2dc; margin-bottom:1.5rem; }
    .d-stat { flex:1; background:#f7f6f3; padding:10px 14px; text-align:center; }
    .d-stat-lbl { font-size:8px; letter-spacing:2px; text-transform:uppercase; color:#aaa; margin-bottom:4px; }
    .d-stat-val { font-size:20px; font-weight:700; font-family:monospace; color:#0c0c0c; }
    .d-stat-val.gold { color:#d4a843; }
    .d-stat-val.green { color:#4caf50; }
    .d-premium { background:#fff; border:1px solid #e4e2dc; border-top:2px solid #d4a843; padding:1rem 1.5rem; margin-bottom:1.5rem; display:flex; justify-content:space-between; align-items:center; }
    .d-premium-label { font-size:10px; letter-spacing:2px; text-transform:uppercase; color:#888; }
    .d-premium-val { font-size:18px; font-weight:700; color:#d4a843; font-family:monospace; }
    .d-section-title { font-size:10px; font-weight:700; letter-spacing:3px; text-transform:uppercase; color:#888; margin-bottom:1rem; }
    table { width:100%; border-collapse:collapse; }
    th { padding:8px 14px; text-align:left; font-size:9px; letter-spacing:2px; text-transform:uppercase; color:#888; background:#f7f6f3; cursor:pointer; white-space:nowrap; }
    th:hover { color:#d4a843; }
    td { padding:10px 14px; font-size:12px; color:#555; border-bottom:1px solid #f0eeea; white-space:nowrap; }
    td:first-child { color:#0c0c0c; font-weight:600; }
    td.gold { color:#d4a843; font-weight:700; font-family:monospace; }
    td.mono { font-family:monospace; }
    td.green { color:#4caf50; font-weight:700; }
    td.red { color:#f44336; font-weight:700; }
    tbody tr:hover td { background:#fdf9f2; }
    .no-section { padding:2rem; text-align:center; color:#aaa; font-size:12px; }
  </style>
</head>
<body>

<nav>
  <div class="logo">Victory Kay <span>Tickets</span></div>
  <a href="/" style="color:#333;font-size:11px;text-decoration:none;letter-spacing:1px;">← BACK TO SITE</a>
</nav>

<div id="main-view">
  <div class="header">
    <div class="title"><strong>VKT</strong> Market Data</div>
    <div class="subtitle">StubHub resale market · Updated daily</div>
    <div class="stats-row">
      <div class="stat"><div class="stat-val gold" id="s-events">—</div><div class="stat-lbl">Events Tracked</div></div>
      <div class="stat"><div class="stat-val" id="s-floor">—</div><div class="stat-lbl">Avg Floor</div></div>
      <div class="stat"><div class="stat-val" id="s-atp">—</div><div class="stat-lbl">Avg ATP</div></div>
      <div class="stat"><div class="stat-val" id="s-snaps">—</div><div class="stat-lbl">Data Points</div></div>
    </div>
  </div>

  <div class="toolbar">
    <input type="text" id="search" placeholder="Search events, teams, artists..." oninput="render()">
    <div style="display:flex;align-items:center;gap:6px;">
      <span class="lbl">Change</span>
      <select id="change-window" onchange="render()">
        <option value="3">3 Days</option>
        <option value="7" selected>7 Days</option>
        <option value="14">14 Days</option>
        <option value="30">30 Days</option>
      </select>
    </div>
    <div style="display:flex;align-items:center;gap:6px;">
      <span class="lbl">Sort</span>
      <select id="sort-sel" onchange="render()">
        <option value="date">Date</option>
        <option value="floor">Floor</option>
        <option value="listings">Listings</option>
        <option value="name">Name</option>
      </select>
    </div>
  </div>

  <div class="main">
    <div class="loading-msg" id="loading-msg">LOADING MARKET DATA...</div>
    <div class="grid" id="grid"></div>
  </div>
</div>

<div id="detail">
  <div style="padding:1.5rem 2rem 0;">
    <button class="back" onclick="showList()">← All Events</button>
    <div class="d-name" id="d-name"></div>
    <div class="d-sub" id="d-sub"></div>
    <div class="d-meta" id="d-meta"></div>
    <div class="d-strip" id="d-strip"></div>
    <div class="d-premium" id="d-premium" style="display:none">
      <div>
        <div class="d-premium-label">Resale Premium over Face Value</div>
        <div style="font-size:10px;color:#333;margin-top:2px;">TM face value vs StubHub resale floor</div>
      </div>
      <div class="d-premium-val" id="d-premium-val"></div>
    </div>
    <div class="d-section-title" id="d-section-title"></div>
  </div>
  <div style="padding:0 2rem 2rem;">
    <div id="d-table"></div>
  </div>
</div>

<script>
const SB  = 'https://unypasitbzulafehbqtj.supabase.co';
const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVueXBhc2l0Ynp1bGFmZWhicXRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwMTE2MjAsImV4cCI6MjA5MDU4NzYyMH0.ywGB7ZccbVxcgZDXMOQB9Ui8R-SF4xF0SKkWavDbRGI';

let shEvents=[], tmEvents=[], shSnaps=[], tmSnaps=[];

async function q(table, params) {
  const r = await fetch(`${SB}/rest/v1/${table}?${params}`, {
    headers:{ apikey:KEY, Authorization:`Bearer ${KEY}` }
  });
  if (!r.ok) throw new Error(r.status);
  return r.json();
}

// Match SH event to TM event by date + venue
function matchTM(shEv) {
  if (!shEv.date) return null;
  return tmEvents.find(tm => {
    if (tm.date !== shEv.date) return false;
    const sv = (shEv.venue||'').toLowerCase().split(',')[0].trim();
    const tv = (tm.venue||'').toLowerCase().split(',')[0].trim();
    if (sv.length > 4 && tv.length > 4) {
      return sv.includes(tv.slice(0,6)) || tv.includes(sv.slice(0,6));
    }
    return false;
  });
}

// Get canonical name: prefer TM name for matched events
function canonicalName(shEv) {
  const tm = matchTM(shEv);
  return tm ? tm.name : (shEv.name || '—');
}

function isJunk(name) {
  if (!name || name.length < 3) return true;
  const junk = [/^buy /i,/hotel deal/i,/\+ hotel/i,/voucher/i,/credential/i,/postgame guest/i,/^dinner$/i,/^snow slide$/i,/pc fees/i,/^section \d+ /i,/non-manifested/i,/shell event/i,/2026 event$/i,/football 2026/i,/basketball 2026/i,/hockey 2026/i,/baseball 2026/i,/soccer 2026/i,/nfl football/i,/nba basketball/i,/nhl hockey/i,/mlb baseball/i];
  return junk.some(p => p.test(name));
}

async function load() {
  document.getElementById('loading-msg').style.display = 'block';
  document.getElementById('grid').innerHTML = '';

  const today = new Date().toISOString().split('T')[0];

  // Load SH + TM events in parallel
  const [sh, tm] = await Promise.all([
    q('events', `not.id=like.tm_*&order=updated_at.desc&limit=100&select=id,name,date,venue,platform`),
    q('events', `platform=eq.Ticketmaster&date=gte.${today}&order=date.asc&limit=200&select=id,name,date,venue,platform`)
  ]);

  shEvents = (sh||[]).filter(e => !isJunk(e.name));
  tmEvents = tm||[];

  if (shEvents.length) {
    const ids = shEvents.map(e=>e.id).join(',');
    shSnaps = await q('volume_snapshots', `event_id=in.(${ids})&order=scraped_at.desc&limit=500&select=id,event_id,total_listings,event_floor,section_floor,section_avg,section_ceiling,section,section_listings,scraped_at`);
  }

  // Load TM snaps for matched events
  const matchedTMIds = shEvents.map(e=>matchTM(e)).filter(Boolean).map(e=>e.id);
  if (matchedTMIds.length) {
    tmSnaps = await q('volume_snapshots', `event_id=in.(${matchedTMIds.join(',')})&order=scraped_at.desc&limit=200&select=id,event_id,event_floor,section_ceiling,scraped_at`);
  }

  document.getElementById('loading-msg').style.display = 'none';
  updateStats();
  render();
}

function getShSnaps(id) { return shSnaps.filter(s=>s.event_id===id); }
function getTmSnaps(id) { return tmSnaps.filter(s=>s.event_id===id); }

function getSummary(id) {
  const s = getShSnaps(id);
  const days = parseInt(document.getElementById('change-window')?.value||'7');
  const cutoff = new Date(Date.now()-days*864e5);

  const floors = s.filter(x=>x.event_floor>0).sort((a,b)=>new Date(b.scraped_at)-new Date(a.scraped_at));
  const lists  = s.filter(x=>x.total_listings>0).sort((a,b)=>new Date(b.scraped_at)-new Date(a.scraped_at));
  const atps   = s.filter(x=>x.section_avg>0);
  const inWin  = s.filter(x=>new Date(x.scraped_at)>=cutoff).sort((a,b)=>new Date(a.scraped_at)-new Date(b.scraped_at));

  let floorChg=null, volChg=null;
  if (inWin.length>=2) {
    const old=inWin[0], nw=inWin[inWin.length-1];
    if(old.event_floor>0&&nw.event_floor>0) floorChg=nw.event_floor-old.event_floor;
    if(old.total_listings>0&&nw.total_listings>0) volChg=nw.total_listings-old.total_listings;
  }

  return {
    floor: floors[0]?.event_floor||null,
    listings: lists[0]?.total_listings||null,
    atp: atps.length?Math.round(atps.reduce((a,x)=>a+x.section_avg,0)/atps.length):null,
    sections: new Set(s.filter(x=>x.section).map(x=>x.section)).size,
    floorChg, volChg,
    floorStart: inWin[0]?.event_floor||null
  };
}

function updateStats() {
  document.getElementById('s-events').textContent = shEvents.length;
  const floors = shSnaps.filter(x=>x.event_floor>0).map(x=>x.event_floor);
  const atps   = shSnaps.filter(x=>x.section_avg>0).map(x=>x.section_avg);
  const avg = a => a.length ? '$'+Math.round(a.reduce((x,y)=>x+y,0)/a.length) : '—';
  document.getElementById('s-floor').textContent = avg(floors);
  document.getElementById('s-atp').textContent = avg(atps);
  document.getElementById('s-snaps').textContent = shSnaps.length.toLocaleString();
}

function fmt(date) {
  if (!date) return '—';
  return new Date(date+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
}

function render() {
  const q2 = document.getElementById('search').value.toLowerCase();
  const sort = document.getElementById('sort-sel').value;
  const days = document.getElementById('change-window').value;

  let list = shEvents.filter(e => {
    if (!q2) return true;
    const name = canonicalName(e).toLowerCase();
    const orig = (e.name||'').toLowerCase();
    return name.includes(q2) || orig.includes(q2);
  });

  list.sort((a,b) => {
    if (sort==='date')     return (a.date||'').localeCompare(b.date||'');
    if (sort==='name')     return canonicalName(a).localeCompare(canonicalName(b));
    if (sort==='floor')    return (getSummary(b.id).floor||0)-(getSummary(a.id).floor||0);
    if (sort==='listings') return (getSummary(b.id).listings||0)-(getSummary(a.id).listings||0);
    return 0;
  });

  if (!list.length) {
    document.getElementById('grid').innerHTML = '<div class="empty-msg">No events found.</div>';
    return;
  }

  document.getElementById('grid').innerHTML = list.map(ev => {
    const s = getSummary(ev.id);
    const canonical = canonicalName(ev);
    const showOrig = canonical !== ev.name && ev.name;
    const tm = matchTM(ev);
    const floorCls = s.floorChg>0?'green':s.floorChg<0?'red':'dim';
    const volCls   = s.volChg<0?'green':s.volChg>0?'red':'dim'; // fewer listings = good (selling)
    const floorChgStr = s.floorChg!==null?(s.floorChg>0?'+$'+s.floorChg:'$'+s.floorChg):null;
    const volChgStr   = s.volChg!==null?(s.volChg>0?'+'+s.volChg:''+s.volChg):null;

    return `<div class="card" onclick="showDetail('${ev.id}')">
      <div class="card-name">${canonical}</div>
      ${showOrig?`<div class="card-orig">${ev.name}</div>`:''}
      <div class="card-meta">
        <span class="tag date">📅 ${fmt(ev.date)}</span>
        ${ev.venue?`<span class="tag venue">📍 ${ev.venue.split(',')[0]}</span>`:''}
        ${tm?`<span class="tag tm">✓ TM</span>`:''}
      </div>
      <div class="card-stats">
        <div class="card-stat"><div class="card-stat-lbl">Listings</div><div class="card-stat-val ${s.listings?'':'dim'}">${s.listings?s.listings.toLocaleString():'—'}</div></div>
        <div class="card-stat"><div class="card-stat-lbl">Floor</div><div class="card-stat-val gold">${s.floor?'$'+s.floor:'—'}</div></div>
        <div class="card-stat"><div class="card-stat-lbl">ATP</div><div class="card-stat-val ${s.atp?'':'dim'}">${s.atp?'$'+s.atp:'—'}</div></div>
      </div>
      <div class="card-change">
        <div class="card-change-cell"><div class="card-change-lbl">Floor ${days}d chg</div><div class="card-change-val ${floorCls}">${floorChgStr||'—'}</div></div>
        <div class="card-change-cell"><div class="card-change-lbl">Vol ${days}d chg</div><div class="card-change-val ${volCls}">${volChgStr||'—'}</div></div>
      </div>
    </div>`;
  }).join('');
}

function showDetail(id) {
  const ev = shEvents.find(e=>e.id===id); if (!ev) return;
  document.getElementById('main-view').style.display = 'none';
  document.getElementById('detail').style.display = 'block';
  window.scrollTo(0,0);

  const canonical = canonicalName(ev);
  const showOrig = canonical !== ev.name && ev.name;
  const tm = matchTM(ev);
  const s = getSummary(id);
  const shS = getShSnaps(id);
  const tmS = tm ? getTmSnaps(tm.id) : [];
  const tmFloor = tmS.filter(x=>x.event_floor>0).sort((a,b)=>new Date(b.scraped_at)-new Date(a.scraped_at))[0]?.event_floor;
  const premium = tmFloor && s.floor ? Math.round(((s.floor-tmFloor)/tmFloor)*100) : null;

  document.getElementById('d-name').textContent = canonical;
  document.getElementById('d-sub').textContent = showOrig ? 'StubHub: '+ev.name : '';
  document.getElementById('d-meta').textContent = [fmt(ev.date), ev.venue||'', tm?'✓ Matched to Ticketmaster':''].filter(Boolean).join(' · ');

  document.getElementById('d-strip').innerHTML = `
    <div class="d-stat"><div class="d-stat-lbl">Listings</div><div class="d-stat-val">${s.listings?s.listings.toLocaleString():'—'}</div></div>
    <div class="d-stat"><div class="d-stat-lbl">Resale Floor</div><div class="d-stat-val gold">${s.floor?'$'+s.floor:'—'}</div></div>
    <div class="d-stat"><div class="d-stat-lbl">Avg ATP</div><div class="d-stat-val">${s.atp?'$'+s.atp:'—'}</div></div>
    <div class="d-stat"><div class="d-stat-lbl">TM Face Value</div><div class="d-stat-val ${tmFloor?'':'dim'}">${tmFloor?'$'+tmFloor:'—'}</div></div>
    <div class="d-stat"><div class="d-stat-lbl">Sections</div><div class="d-stat-val">${s.sections||'—'}</div></div>
  `;

  const premEl = document.getElementById('d-premium');
  if (premium !== null) {
    premEl.style.display = 'flex';
    document.getElementById('d-premium-val').textContent = (premium>0?'+':'')+premium+'% above face value';
  } else {
    premEl.style.display = 'none';
  }

  // Section table
  const secSnaps = shS.filter(x=>x.section);
  const bySec = {};
  secSnaps.forEach(x=>{
    if(!bySec[x.section]) bySec[x.section]={f:[],a:[],c:[],l:[]};
    if(x.section_floor>0) bySec[x.section].f.push(x.section_floor);
    if(x.section_avg>0)   bySec[x.section].a.push(x.section_avg);
    if(x.section_ceiling>0) bySec[x.section].c.push(x.section_ceiling);
    if(x.section_listings>0) bySec[x.section].l.push(x.section_listings);
  });

  const avg = a => a.length?Math.round(a.reduce((x,y)=>x+y,0)/a.length):null;
  const secs = Object.entries(bySec).map(([sec,d])=>({
    sec, f:avg(d.f), a:avg(d.a), c:avg(d.c),
    l:d.l.length?d.l[d.l.length-1]:null
  })).sort((a,b)=>(a.f||9999)-(b.f||9999));

  document.getElementById('d-section-title').textContent = secs.length ? `SECTION BREAKDOWN — ${secs.length} SECTIONS` : '';
  document.getElementById('d-table').innerHTML = secs.length ? `
    <table>
      <thead><tr><th>Section</th><th>Floor</th><th>ATP</th><th>Ceiling</th><th>Listings</th></tr></thead>
      <tbody>${secs.map(s=>`<tr>
        <td>${s.sec}</td>
        <td class="gold">${s.f?'$'+s.f:'—'}</td>
        <td class="mono">${s.a?'$'+s.a:'—'}</td>
        <td class="mono">${s.c?'$'+s.c:'—'}</td>
        <td class="mono">${s.l??'—'}</td>
      </tr>`).join('')}</tbody>
    </table>` : '<div class="no-section">No section data yet — run the section scraper on this event to see breakdown by section</div>';
}

function showList() {
