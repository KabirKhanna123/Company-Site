<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VKT Market Data</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:Arial,sans-serif; background:#f7f6f3; color:#1a1a1a; }
    nav { background:#fff; border-bottom:1px solid #e4e2dc; padding:0 2rem; height:56px; display:flex; align-items:center; justify-content:space-between; }
    .logo { font-size:12px; font-weight:700; letter-spacing:4px; text-transform:uppercase; }
    .logo span { color:#d4a843; }
    .header { padding:1.5rem 2rem; background:#fff; border-bottom:1px solid #e4e2dc; }
    h1 { font-size:22px; font-weight:300; }
    h1 strong { color:#d4a843; }
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:1px; background:#e4e2dc; padding:1.5rem 2rem; }
    .card { background:#fff; padding:1.25rem; cursor:pointer; }
    .card:hover { background:#fdf9f2; }
    .card-name { font-size:13px; font-weight:600; margin-bottom:4px; }
    .card-meta { font-size:11px; color:#888; margin-bottom:10px; }
    .card-stats { display:grid; grid-template-columns:1fr 1fr 1fr; gap:1px; background:#e4e2dc; }
    .cs { background:#f7f6f3; padding:8px; text-align:center; }
    .cs-l { font-size:8px; letter-spacing:1px; text-transform:uppercase; color:#aaa; margin-bottom:3px; }
    .cs-v { font-size:15px; font-weight:700; color:#1a1a1a; font-family:monospace; }
    .cs-v.gold { color:#d4a843; }
    .msg { padding:3rem; text-align:center; color:#aaa; }
  </style>
</head>
<body>
<nav>
  <div class="logo">Victory Kay <span>Tickets</span></div>
  <a href="/" style="color:#888;font-size:11px;text-decoration:none;">← Back</a>
</nav>
<div class="header">
  <h1><strong>VKT</strong> Market Data</h1>
</div>
<div class="grid" id="grid"><div class="msg">Loading...</div></div>

<script>
const SB  = 'https://unypasitbzulafehbqtj.supabase.co';
const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVueXBhc2l0Ynp1bGFmZWhicXRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwMTE2MjAsImV4cCI6MjA5MDU4NzYyMH0.ywGB7ZccbVxcgZDXMOQB9Ui8R-SF4xF0SKkWavDbRGI';

async function load() {
  // Load TM events (real names/dates) sorted by upcoming date
  const today = new Date().toISOString().split('T')[0];
  const r = await fetch(`${SB}/rest/v1/events?platform=eq.Ticketmaster&date=gte.${today}&order=date.asc&limit=50&select=id,name,date,venue`, {
    headers:{ apikey:KEY, Authorization:`Bearer ${KEY}` }
  });
  let events = await r.json();
  // Filter junk
  const junk = /hotel|voucher|credential|postgame|^dinner$|^section \d/i;
  events = events.filter(e => e.name && e.name.length > 3 && !junk.test(e.name));
  if (!events.length) { document.getElementById('grid').innerHTML='<div class="msg">No events found.</div>'; return; }
  document.getElementById('grid').innerHTML = events.map(ev => `
    <div class="card">
      <div class="card-name">${ev.name||'—'}</div>
      <div class="card-meta">${ev.date||'No date'} ${ev.venue?'· '+ev.venue.split(',')[0]:''}</div>
      <div class="card-stats">
        <div class="cs"><div class="cs-l">Floor</div><div class="cs-v gold">—</div></div>
        <div class="cs"><div class="cs-l">ATP</div><div class="cs-v">—</div></div>
        <div class="cs"><div class="cs-l">Listings</div><div class="cs-v">—</div></div>
      </div>
    </div>`).join('');
}
load();
</script>
</body>
</html>
